lass="line">        if (mInstance != null) &#123;</div><div class="line">            mInstance.onActivityStart();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onResume() &#123;</div><div class="line">        super.onResume();</div><div class="line">        if (mInstance != null) &#123;</div><div class="line">            mInstance.onActivityResume();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onPause() &#123;</div><div class="line">        super.onPause();</div><div class="line">        if (mInstance != null) &#123;</div><div class="line">            mInstance.onActivityPause();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onStop() &#123;</div><div class="line">        super.onStop();</div><div class="line">        if (mInstance != null) &#123;</div><div class="line">            mInstance.onActivityStop();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onDestroy() &#123;</div><div class="line">        super.onDestroy();</div><div class="line">        if (mInstance != null) &#123;</div><div class="line">            mInstance.onActivityDestroy();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onViewCreated(WXSDKInstance wxsdkInstance, View view) &#123;</div><div class="line">        if (mContainer != null) &#123;</div><div class="line">            mContainer.addView(view);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onRenderSuccess(WXSDKInstance wxsdkInstance, int i, int i1) &#123;</div><div class="line"></div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onRefreshSuccess(WXSDKInstance wxsdkInstance, int i, int i1) &#123;</div><div class="line"></div><div class="line">    &#125;</div><div class="line"></div><div class="line">    @Override</div><div class="line">    public void onException(WXSDKInstance wxsdkInstance, String s, String s1) &#123;</div><div class="line"></div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
