<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title>【Weex】Weex环境搭建 · Hans Zone</title><meta name="description" content="【Weex】Weex环境搭建 - Hans"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.ico"><link rel="stylesheet" href="/css/gandalfr.css"><link rel="stylesheet" href="https://highlightjs.org/static/demo/styles/solarized-light.css"><link rel="search" type="application/opensearchdescription+xml" href="http://www.hanszone.tech/atom.xml" title="Hans Zone"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="https://ws1.sinaimg.cn/large/707b3cfbgy1feut9tltstj20cs0csgmj.jpg" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">TAG</a></li><li class="nav-list-item"><a href="/about/" target="_self" class="nav-list-link">ABOUT</a></li><li class="nav-list-item"><a href="http://www.github.com/Alphahans" target="_blank" class="nav-list-link">GITHUB</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">【Weex】Weex环境搭建</h1><div class="tags"><a href="/tags/Weex/" class="tag-title">#Weex</a></div><div class="post-info">Jan 18, 2017</div><div class="post-content"><h2 id="安装Nodejs与npm"><a href="#安装Nodejs与npm" class="headerlink" title="安装Nodejs与npm"></a>安装Nodejs与npm</h2><a id="more"></a>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">node -v</div><div class="line"></div><div class="line">npm -v</div></pre></td></tr></table></figure>
<p>可以用于查看当面nodejs和npm的版本</p>
<p>淘宝镜像cnpm:</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">npm install -g cnpm</div></pre></td></tr></table></figure>
<h2 id="安装Weex-ToolKit"><a href="#安装Weex-ToolKit" class="headerlink" title="安装Weex ToolKit"></a>安装Weex ToolKit</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">npm install -g weex-toolkit</div></pre></td></tr></table></figure>
<p><img src="http://p1.bpimg.com/567571/72b9d8d509c03318.png" alt=""></p>
<p>如果是macOS可能需要添加权限：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">sudo npm install -g weex-toolkit</div></pre></td></tr></table></figure>
<p>安装成功后：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">weex --version</div></pre></td></tr></table></figure>
<p>可以看到当前版本</p>
<p><img src="http://i1.piimg.com/567571/f17285c21e83bd5e.png" alt=""></p>
<h2 id="Hello"><a href="#Hello" class="headerlink" title="Hello"></a>Hello</h2><p>创建文件<code>hello.we</code>:</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">&lt;template&gt;</div><div class="line"></div><div class="line">  &lt;div&gt;</div><div class="line"></div><div class="line">    &lt;text&gt;Hello&lt;/text&gt;</div><div class="line"></div><div class="line">  &lt;/div&gt;</div><div class="line"></div><div class="line">&lt;/template&gt;</div><div class="line"></div><div class="line">&lt;style&gt;&lt;/style&gt;</div><div class="line"></div><div class="line">&lt;script&gt;&lt;/script&gt;</div></pre></td></tr></table></figure>
<p>然后使用Weex命令编译</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"></div><div class="line">weex hello.we</div></pre></td></tr></table></figure>
<p>即可看到：</p>
<p><img src="http://i1.piimg.com/567571/ab6db1a614221c34.png" alt=""></p>
<h2 id="Weex编译后的html文件"><a href="#Weex编译后的html文件" class="headerlink" title="Weex编译后的html文件"></a>Weex编译后的html文件</h2><p>在相同目录下会生成一个weex_temp的文件夹，里面存放了真正的html文件</p>
